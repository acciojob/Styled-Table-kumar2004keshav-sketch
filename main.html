<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="styles.css">
	 <title>CBSE Result Sheet</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7fb;
        }

        table {
            width: 70%;
            margin: 50px auto;
            border-collapse: collapse;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            background-color: #fff;
        }

        thead {
            background-color: #2c3e50;
            color: white;
        }

        th, td {
            padding: 12px;
            text-align: center;
            border: 1px solid #ddd;
        }

        tbody tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        tbody tr:hover {
            background-color: #d6eaf8;
        }

        th {
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        caption {
            caption-side: top;
            font-size: 24px;
            margin: 10px;
            font-weight: bold;
            color: #2c3e50;
        }
    </style>
</head>
<body>
    <!-- add table here -->
	<table>
    <caption>CBSE Result Sheet</caption>

    <thead>
        <tr>
            <th>Subject</th>
            <th>Marks Obtained</th>
            <th>Maximum Marks</th>
            <th>Grade</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td>Mathematics</td>
            <td>92</td>
            <td>100</td>
            <td>A1</td>
        </tr>
        <tr>
            <td>Science</td>
            <td>88</td>
            <td>100</td>
            <td>A2</td>
        </tr>
        <tr>
            <td>English</td>
            <td>85</td>
            <td>100</td>
            <td>A2</td>
        </tr>
        <tr>
            <td>Social Science</td>
            <td>90</td>
            <td>100</td>
            <td>A1</td>
        </tr>
        <tr>
            <td>Computer</td>
            <td>95</td>
            <td>100</td>
            <td>A1</td>
        </tr>
    </tbody>
</table>

        
</body>
</html>
